apiVersion: apps/v1
kind: Deployment
metadata:
  name: ollama
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ollama
  template:
    metadata:
      labels:
        app: ollama
    spec:
      securityContext:
        supplementalGroups: [44, 991]
      containers:
        - name: ollama
          image: ollama/ollama:rocm
          securityContext:
            privileged: true
          ports:
            - containerPort: 11434
          env:
            - name: HSA_OVERRIDE_GFX_VERSION
              value: "11.0.0"
            - name: OLLAMA_IGPU_ENABLE
              value: "1"
          volumeMounts:
            - name: models
              mountPath: /root/.ollama
            - name: dri
              mountPath: /dev/dri
            - name: kfd
              mountPath: /dev/kfd
          resources:
            requests:
              memory: "4Gi"
            limits:
              memory: "100Gi"
      volumes:
        - name: models
          hostPath:
            path: /usr/share/ollama/.ollama
            type: Directory
        - name: dri
          hostPath:
            path: /dev/dri
            type: Directory
        - name: kfd
          hostPath:
            path: /dev/kfd
            type: CharDevice
---
apiVersion: v1
kind: Service
metadata:
  name: ollama
  namespace: default
spec:
  type: ClusterIP
  selector:
    app: ollama
  ports:
    - port: 11434
      targetPort: 11434
